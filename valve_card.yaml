type: vertical-stack
cards:
  - type: custom:mushroom-entity-card
    entity: switch.wfc01_00001234_valve
    icon: mdi:toggle-switch
    tap_action:
      action: toggle
    fill_container: true
    layout: vertical
    icon_color: green
    name: Manual On/Off
    primary_info: name
    secondary_info: last-changed
  - type: horizontal-stack
    cards:
      - type: custom:mushroom-template-card
        primary: |-
          {% set s = states('sensor.wfc01_00001234_run_time_live') | int %}
          {{ '%02d:%02d' % (s // 60, s % 60) }}
        secondary: Run Time
        icon: mdi:timer-outline
        tap_action:
          action: none
        color: blue
        vertical: true
        features_position: bottom
      - type: custom:mushroom-template-card
        primary: >-
          {% set vtype = state_attr('switch.wfc01_00001234_valve', 'val_type')
          %} {% set val = state_attr('switch.wfc01_00001234_valve', 'val') %} {%
          set always = state_attr('switch.wfc01_00001234_valve', 'always_on') %}
          {% if always == 1 %}-- {% elif vtype == 1 and val is not none %}{{ val
          }} min {% elif vtype == 3 and val is not none %}{{ (val | float / 10)
          | round(1) }} L {% else %}--{% endif %}
        secondary: Target
        icon: mdi:target
        icon_color: orange
        layout: vertical
        tap_action:
          action: none
      - type: custom:mushroom-template-card
        primary: "{{ states('sensor.wfc01_00001234_flow_rate') }} L/min"
        secondary: Flow Rate
        icon: mdi:speedometer
        icon_color: cyan
        layout: vertical
        tap_action:
          action: none
      - type: custom:mushroom-template-card
        primary: "{{ states('sensor.wfc01_00001234_session_water_usage') }} L"
        secondary: Water Used
        tap_action:
          action: none
        color: cyan
        vertical: true
        features_position: bottom
        icon: mdi:water
  - type: horizontal-stack
    cards:
      - type: entities
        entities:
          - entity: number.wfc01_00001234_run_minutes
            name: Time (min)
      - type: entities
        entities:
          - entity: number.wfc01_00001234_run_litres
            name: Volume (L)
  - type: horizontal-stack
    cards:
      - type: button
        entity: button.wfc01_00001234_start_timed_run
        name: Start Timed
        icon: mdi:timer-play
        show_state: false
        tap_action:
          action: toggle
      - type: button
        entity: button.wfc01_00001234_start_volume_run
        name: Start Volume
        icon: mdi:water-plus
        show_state: false
        tap_action:
          action: toggle
  - type: custom:mushroom-template-card
    primary: Cycle Settings
    secondary: >-
      {% set on_t = states('number.wfc01_00001234_cycle_on_time') | int(0) %} {%
      set off_t = states('number.wfc01_00001234_cycle_off_time') | int(0) %} {%
      if on_t > 0 and off_t > 0 %}
        {{ on_t }}s on / {{ off_t }}s off
      {% else %}
        Continuous (no cycling)
      {% endif %}
    icon: |-
      {% if is_state('input_boolean.show_valve_cycle', 'on') %}
        mdi:chevron-up
      {% else %}
        mdi:chevron-down
      {% endif %}
    icon_color: purple
    tap_action:
      action: call-service
      service: input_boolean.toggle
      target:
        entity_id: input_boolean.show_valve_cycle
  - type: conditional
    conditions:
      - condition: state
        entity: input_boolean.show_valve_cycle
        state: "on"
    card:
      type: entities
      entities:
        - entity: number.wfc01_00001234_cycle_on_time
          name: Cycle On Time (seconds)
        - entity: number.wfc01_00001234_cycle_off_time
          name: Cycle Off Time (seconds)
  - type: custom:mushroom-template-card
    primary: Schedule
    secondary: |-
      {% if is_state('input_boolean.valve_schedule_enabled', 'on') %}
        Daily at {{ states('input_datetime.valve_schedule_time') }} for {{ states('input_number.valve_schedule_duration') | int }} min
      {% else %}
        Disabled
      {% endif %}
    icon: mdi:calendar-clock
    icon_color: |-
      {% if is_state('input_boolean.valve_schedule_enabled', 'on') %}
        green
      {% else %}
        grey
      {% endif %}
    tap_action:
      action: none
  - type: entities
    entities:
      - entity: input_boolean.valve_schedule_enabled
        name: Enable Schedule
      - entity: input_datetime.valve_schedule_time
        name: Start Time
      - entity: input_number.valve_schedule_duration
        name: Duration (min)
title: Water Valve
